name: security-audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pnpm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Audit (triage check)
        run: node scripts/check-audit-triage.js
      - name: Storefront client boundary (no server secrets in client graph)
        run: node scripts/check-storefront-client-boundary.mjs
      - name: Supabase migrations (no parallel Medusa commerce tables)
        run: node scripts/check-commerce-migration-boundary.mjs
      - name: Admin API staff / internal guard patterns
        run: node scripts/check-admin-api-staff-guard.mjs
