# Fly.io — Medusa backend
# Deploy: fly deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "maharlika-apparel-custom"

[build]
  dockerfile = "Dockerfile.medusa"

[env]
  NODE_ENV = "production"

# Medusa uses port 9000. Fly sets PORT automatically; internal_port must match.
[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    path = "/health"

# MVP spec: 512MB shared CPU. Upgrade to 1gb+ for production traffic.
[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
